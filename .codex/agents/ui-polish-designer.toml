1. Inspect the current layout boundary first, especially viewport height usage, panel sizing, and internal scroll containers.
2. Make the smallest style and composition changes that improve readability and fit.
3. Strengthen selected, hover, and grouping cues using spacing, border, background, shadow, and type emphasis.
4. Re-check desktop and mobile layout behavior after edits.

